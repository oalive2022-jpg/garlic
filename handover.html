<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にんにく在庫管理 - 申し送り(予測vs実測)</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif; background: #f2f4f0; color: #222; }
.header { background: #3B6D11; color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.hl { display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
.rbadge { background: rgba(255,255,255,0.15); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
main { padding: 20px 24px 60px; max-width: 1100px; margin: 0 auto; }

.week-bar { display: flex; align-items: center; gap: 10px; background: white; border: 1px solid #e4e8dc; border-radius: 12px; padding: 14px 18px; margin-bottom: 18px; flex-wrap: wrap; }
.week-bar strong { font-size: 14px; margin-right: 6px; }
.week-bar input[type="date"] { height: 36px; border: 1px solid #d0d4c8; border-radius: 8px; padding: 0 10px; font-size: 13px; }
.btn { height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid #c8ccc0; background: white; font-size: 13px; cursor: pointer; color: #333; }
.btn:hover { background: #f5f7f2; }
.btn-primary { background: #3B6D11; color: white; border-color: #3B6D11; }
.btn-primary:hover { background: #27500A; }
.btn-export { background: #185FA5; color: white; border-color: #185FA5; margin-left: auto; }
.btn-export:hover { background: #0C447C; }

.hint-box { background: #FDF3E3; border: 1px solid #ecd39a; border-radius: 10px; padding: 12px 16px; margin-bottom: 18px; font-size: 12.5px; color: #5a3c06; line-height: 1.7; }

.day-block { background: white; border-radius: 12px; border: 1px solid #e4e8dc; margin-bottom: 14px; overflow: hidden; }
.day-head { padding: 10px 18px; background: #f7f9f4; border-bottom: 1px solid #e4e8dc; font-size: 13.5px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.day-head .wd { font-size: 11px; font-weight: 500; color: #888; }

table.sched { width: 100%; border-collapse: collapse; font-size: 13px; }
table.sched th { background: #fafbf8; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 11.5px; color: #888; border-bottom: 1px solid #eef0ea; }
table.sched td { padding: 7px 10px; border-bottom: 1px solid #f4f5f1; vertical-align: middle; }
table.sched tr:last-child td { border-bottom: none; }

.dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot-c { background: #639922; } .dot-d { background: #D85A30; } .dot-s { background: #378ADD; } .dot-p { background: #B87820; }

.pred-input { width: 70px; height: 30px; border: 1.5px solid #d0d4c8; border-radius: 6px; padding: 0 8px; font-size: 13px; text-align: right; }
.pred-input:focus { border-color: #3B6D11; outline: none; }
.actual-val { font-weight: 700; font-size: 13.5px; }
.diff-tag { display: inline-block; font-size: 11.5px; font-weight: 700; border-radius: 6px; padding: 2px 8px; }
.diff-zero { background: #EAF3DE; color: #27500A; }
.diff-over { background: #E6F1FB; color: #0C447C; }
.diff-under { background: #FAECE7; color: #712B13; }
.diff-none { background: #f0f0ec; color: #999; font-weight: 500; }
.note-input { width: 100%; min-width: 90px; height: 30px; border: 1px solid #e4e8dc; border-radius: 6px; padding: 0 8px; font-size: 12px; color: #666; }

.save-bar { display: flex; gap: 10px; margin-top: 4px; margin-bottom: 26px; }
.save-status { font-size: 12px; color: #3B6D11; align-self: center; }

.type-th { white-space: nowrap; }

.task-master-box { background: white; border: 1px solid #e4e8dc; border-radius: 12px; padding: 16px 18px; margin-bottom: 18px; }
.task-master-box h3 { font-size: 13.5px; font-weight: 700; margin-bottom: 10px; }
.task-chip { display: inline-flex; align-items: center; gap: 6px; background: #f7f9f4; border: 1px solid #e4e8dc; border-radius: 20px; padding: 5px 6px 5px 12px; font-size: 12.5px; margin: 0 6px 6px 0; }
.task-chip .linked { color: #888; font-size: 11px; }
.task-chip button { border: none; background: #fbeceb; color: #b33a3a; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; line-height: 1; }
.task-add-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
.task-add-row input, .task-add-row select { height: 32px; border: 1px solid #d0d4c8; border-radius: 6px; padding: 0 8px; font-size: 12.5px; }
.task-add-row button { height: 32px; padding: 0 12px; border-radius: 6px; border: 1px solid #3B6D11; background: #3B6D11; color: white; font-size: 12.5px; cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="header">
  <div class="hl">
    <span style="font-size:26px">📋</span>
    <div>
      <h1>申し送り — 予測 vs 実測</h1>
      <p>チャッピーの週間予測と、在庫管理アプリの実測データを突き合わせます</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/admin.html" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.4);color:white;border-radius:20px;padding:5px 14px;font-size:12px;text-decoration:none">🧄 在庫管理画面へ</a>
    <span class="rbadge">管理者</span>
  </div>
</div>

<main>

  <div class="hint-box">
    💡 使い方：①チャッピーが出した向こう1週間の作業予定・数量を「予測」欄に入力して保存 → ②実測は在庫管理アプリのデータから自動集計されます → ③週末に「Excel出力」して、その週の予測vs実測をチャッピーに再投入すると、次週の予測精度が上がります。
  </div>

  <div class="task-master-box">
    <h3>🔧 作業マスタ(この一覧の作業について予測・実測を管理します)</h3>
    <div id="task-chips">読み込み中...</div>
    <div class="task-add-row">
      <input type="text" id="new-task-name" placeholder="作業名（例：醤油酢漬け）" style="width:160px">
      <select id="new-task-linked">
        <option value="clean">きれい実測と紐づけ</option>
        <option value="damaged">傷実測と紐づけ</option>
        <option value="shipped">出荷用実測と紐づけ</option>
        <option value="planting">植え込み実測と紐づけ</option>
      </select>
      <button onclick="addTask()">＋ 作業を追加</button>
    </div>
  </div>

  <div class="week-bar">
    <strong>対象週</strong>
    <button class="btn" onclick="shiftWeek(-7)">◀ 前週</button>
    <input type="date" id="week-start">
    <button class="btn" onclick="shiftWeek(7)">翌週 ▶</button>
    <button class="btn btn-primary" onclick="loadWeek()">この週を表示</button>
    <select id="company-filter" onchange="renderDays()" style="height:36px;border:1px solid #d0d4c8;border-radius:8px;padding:0 10px;font-size:13px;">
      <option value="">全社合計</option>
    </select>
    <button class="btn btn-export" onclick="exportExcel()">📥 Excel出力</button>
  </div>

  <div id="days-container"></div>

  <div class="save-bar">
    <button class="btn btn-primary" onclick="saveAllPredictions()">💾 予測をすべて保存</button>
    <span class="save-status" id="save-status"></span>
  </div>

</main>

<script>
const _token = sessionStorage.getItem('garlic-token');
const _role  = sessionStorage.getItem('garlic-role');
if (!_token || _role !== 'admin') { location.href = '/login.html'; }

function authHeaders() {
  return { 'Content-Type': 'application/json', 'x-session-token': sessionStorage.getItem('garlic-token') };
}

const TYPE_LABEL = { clean: 'きれい', damaged: '傷', shipped: '出荷用', planting: '植え込み' };
const TYPE_DOT = { clean: 'dot-c', damaged: 'dot-d', shipped: 'dot-s', planting: 'dot-p' };
const WEEKDAYS = ['日','月','火','水','木','金','土'];

let predictions = {};   // key: date||task_name||(company|__ALL__) -> {id, predicted_count, note, company, type, task}
let actualsTotal = {};  // key: date||type -> 全社合計
let actualsByCompany = {}; // key: date||type||company -> 企業別
let weekDates = [];
let companyList = [];
let taskMaster = [];    // [{id, task_name, linked_type, sort_order}]

function currentCompany() {
  return document.getElementById('company-filter').value; // '' = 全社合計
}

async function loadCompanyList() {
  try {
    const data = await fetch('/api/data', { headers: authHeaders() }).then(r => r.json());
    companyList = data.companies || [];
    const sel = document.getElementById('company-filter');
    const prev = sel.value;
    sel.innerHTML = '<option value="">全社合計</option>' +
      companyList.map(c => `<option value="${c}">${c}</option>`).join('');
    sel.value = prev && companyList.includes(prev) ? prev : '';
  } catch(e) { /* 企業一覧が取れなくても致命的ではないので握りつぶす */ }
}

async function loadTaskMaster() {
  try {
    const data = await fetch('/api/task-master', { headers: authHeaders() }).then(r => r.json());
    taskMaster = data.tasks || [];
  } catch(e) { taskMaster = []; }
  renderTaskChips();
}

function renderTaskChips() {
  const box = document.getElementById('task-chips');
  if (taskMaster.length === 0) {
    box.innerHTML = '<span style="font-size:12.5px;color:#999">まだ作業が登録されていません。下から追加してください。</span>';
    return;
  }
  box.innerHTML = taskMaster.map(t => `
    <span class="task-chip">
      <span class="dot ${TYPE_DOT[t.linked_type]}"></span>${t.task_name}
      <span class="linked">(${TYPE_LABEL[t.linked_type]}実測)</span>
      <button onclick="deleteTask(${t.id})" title="削除">×</button>
    </span>`).join('');
}

async function addTask() {
  const nameEl = document.getElementById('new-task-name');
  const linkedEl = document.getElementById('new-task-linked');
  const task_name = nameEl.value.trim();
  if (!task_name) { alert('作業名を入力してください'); return; }
  try {
    const r = await fetch('/api/task-master', {
      method: 'POST', headers: authHeaders(),
      body: JSON.stringify({ task_name, linked_type: linkedEl.value, sort_order: taskMaster.length + 1 })
    }).then(r => r.json());
    if (r.error) { alert(r.error); return; }
    nameEl.value = '';
    await loadTaskMaster();
    renderDays();
  } catch(e) { alert('追加に失敗しました'); }
}

async function deleteTask(id) {
  if (!confirm('この作業を作業マスタから削除しますか？(過去の予測データは残ります)')) return;
  await fetch(`/api/task-master/${id}`, { method: 'DELETE', headers: authHeaders() });
  await loadTaskMaster();
  renderDays();
}

function toDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getNextMonday() {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 1 : (day === 1 ? 0 : 8 - day);
  d.setDate(d.getDate() + diff);
  return d;
}

function initWeekStart() {
  document.getElementById('week-start').value = toDateStr(getNextMonday());
}

function shiftWeek(days) {
  const el = document.getElementById('week-start');
  const d = new Date(el.value);
  d.setDate(d.getDate() + days);
  el.value = toDateStr(d);
  loadWeek();
}

function buildWeekDates() {
  const start = new Date(document.getElementById('week-start').value);
  weekDates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    weekDates.push(d);
  }
}

async function loadWeek() {
  buildWeekDates();
  const start = toDateStr(weekDates[0]);
  const end = toDateStr(weekDates[6]);

  const [predRes, actRes] = await Promise.all([
    fetch(`/api/predictions?start=${start}&end=${end}`, { headers: authHeaders() }).then(r => r.json()),
    fetch(`/api/actuals?start=${start}&end=${end}`, { headers: authHeaders() }).then(r => r.json())
  ]);

  predictions = {};
  (predRes.predictions || []).forEach(p => {
    const companyKey = p.company || '__ALL__';
    const taskKey = p.task || '__NOTASK__';
    predictions[`${p.date}||${taskKey}||${companyKey}`] = p;
  });
  actualsTotal = actRes.totals || {};
  actualsByCompany = actRes.byCompany || {};

  renderDays();
}

function renderDays() {
  const company = currentCompany();
  const companyKey = company || '__ALL__';
  const container = document.getElementById('days-container');
  const scopeLabel = company ? `【${company}】の予測・実測` : '【全社合計】の予測・実測';

  if (taskMaster.length === 0) {
    container.innerHTML = '<div style="font-size:13px;color:#999;padding:20px;text-align:center">上の「作業マスタ」に作業を追加すると、ここに週間予定表が表示されます</div>';
    return;
  }

  container.innerHTML = `<div style="font-size:12.5px;color:#666;margin-bottom:10px;font-weight:600">${scopeLabel}</div>` +
    weekDates.map(d => {
    const dateStr = toDateStr(d);
    const wd = WEEKDAYS[d.getDay()];
    const rows = taskMaster.map(t => {
      const key = `${dateStr}||${t.task_name}||${companyKey}`;
      const pred = predictions[key];
      const predVal = pred ? pred.predicted_count : '';
      const noteVal = pred && pred.note ? pred.note : '';
      const actualVal = company
        ? (actualsByCompany[`${dateStr}||${t.linked_type}||${company}`] || 0)
        : (actualsTotal[`${dateStr}||${t.linked_type}`] || 0);

      let diffHtml;
      if (pred === undefined || predVal === '') {
        diffHtml = `<span class="diff-tag diff-none">予測未入力</span>`;
      } else {
        const diff = actualVal - parseInt(predVal);
        if (diff === 0) diffHtml = `<span class="diff-tag diff-zero">ぴったり</span>`;
        else if (diff > 0) diffHtml = `<span class="diff-tag diff-over">+${diff}(実測多)</span>`;
        else diffHtml = `<span class="diff-tag diff-under">${diff}(実測少)</span>`;
      }

      return `
        <tr>
          <td><span class="dot ${TYPE_DOT[t.linked_type]}"></span>${t.task_name}</td>
          <td><input type="number" class="pred-input" data-date="${dateStr}" data-task="${t.task_name}" data-type="${t.linked_type}" value="${predVal}" placeholder="—"></td>
          <td class="actual-val">${actualVal}</td>
          <td>${diffHtml}</td>
          <td><input type="text" class="note-input" data-date="${dateStr}" data-task="${t.task_name}" value="${noteVal}" placeholder="メモ"></td>
        </tr>`;
    }).join('');

    return `
      <div class="day-block">
        <div class="day-head">${dateStr} <span class="wd">(${wd})</span></div>
        <table class="sched">
          <tr>
            <th class="type-th">作業</th>
            <th class="type-th">予測(チャッピー)</th>
            <th class="type-th">実測(自動集計)</th>
            <th class="type-th">差分</th>
            <th>メモ</th>
          </tr>
          ${rows}
        </table>
      </div>`;
  }).join('');
}

async function saveAllPredictions() {
  const company = currentCompany();
  const inputs = document.querySelectorAll('.pred-input');
  const statusEl = document.getElementById('save-status');
  statusEl.textContent = '保存中...';

  const jobs = [];
  inputs.forEach(input => {
    const val = input.value;
    if (val === '') return;
    const date = input.dataset.date;
    const task = input.dataset.task;
    const type = input.dataset.type;
    const noteInput = document.querySelector(`.note-input[data-date="${date}"][data-task="${CSS.escape(task)}"]`);
    const note = noteInput ? noteInput.value : '';
    jobs.push(
      fetch('/api/prediction', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ date, type, task, predicted_count: val, note, company: company || null })
      })
    );
  });

  try {
    await Promise.all(jobs);
    statusEl.textContent = `✓ ${jobs.length}件の予測を保存しました（${company ? company : '全社合計'}）`;
    await loadWeek();
  } catch(e) {
    statusEl.textContent = '保存に失敗しました';
  }
  setTimeout(() => statusEl.textContent = '', 4000);
}

function exportExcel() {
  const company = currentCompany();
  const companyKey = company || '__ALL__';
  const rows = [['日付', '曜日', '企業', '作業', '紐づく種別', '予測(チャッピー)', '実測(自動集計)', '差分', 'メモ']];
  weekDates.forEach(d => {
    const dateStr = toDateStr(d);
    const wd = WEEKDAYS[d.getDay()];
    taskMaster.forEach(t => {
      const key = `${dateStr}||${t.task_name}||${companyKey}`;
      const pred = predictions[key];
      const predVal = pred ? pred.predicted_count : '';
      const actualVal = company
        ? (actualsByCompany[`${dateStr}||${t.linked_type}||${company}`] || 0)
        : (actualsTotal[`${dateStr}||${t.linked_type}`] || 0);
      const diff = (predVal === '' || predVal === undefined) ? '' : (actualVal - parseInt(predVal));
      const note = pred && pred.note ? pred.note : '';
      rows.push([dateStr, wd, company || '全社合計', t.task_name, TYPE_LABEL[t.linked_type], predVal, actualVal, diff, note]);
    });
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:12},{wch:6},{wch:14},{wch:14},{wch:10},{wch:14},{wch:14},{wch:10},{wch:24}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '予測vs実測');

  const start = toDateStr(weekDates[0]);
  const end = toDateStr(weekDates[6]);
  const label = company ? company.replace(/[\\/:*?"<>|]/g,'_') : '全社合計';
  XLSX.writeFile(wb, `にんにく申し送り_${label}_${start}_${end}.xlsx`);
}

initWeekStart();
loadCompanyList();
loadTaskMaster().then(loadWeek);
</script>
</body>
</html>
